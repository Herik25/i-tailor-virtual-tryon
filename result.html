<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor - Your fresh look generated by AI.">
    <title>iTailor | Your Fresh Look</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="result-container">
        <div class="result-left">
            <button id="close-btn" onclick="window.location.href='index.html'" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.75729 17.2426L11.9999 12M17.2426 6.75736L11.9999 12M11.9999 12L6.75729 6.75736M11.9999 12L17.2426 17.2426" stroke="#482A18" stroke-width="1.125" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="result-content">
                <h1 class="result-title">Here's your fresh Look</h1>
                <p class="result-text">To try on this look, we need to create your personal AI Model. Don't worry, it only takes a moment, and you'll be able to use it again anytime.</p>
                <a href="#" class="shop-btn">SHOP THIS LOOK</a>
            </div>
        </div>
        <div class="result-right">
            <img src="suit-base.png" alt="Your Fresh Look" class="result-image">
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.result-container');
            container.style.opacity = '0';
            container.style.transition = 'opacity 1s ease-out';
            setTimeout(() => {
                container.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
