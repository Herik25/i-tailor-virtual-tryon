<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor - Your fresh look generated by AI.">
    <title>iTailor | Your Fresh Look</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="result-container">
        <div class="result-left">
            <button id="close-btn" onclick="window.location.href='index.html'" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.75729 17.2426L11.9999 12M17.2426 6.75736L11.9999 12M11.9999 12L6.75729 6.75736M11.9999 12L17.2426 17.2426" stroke="#482A18" stroke-width="1.125" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="result-content">
                <h1 class="result-title">A Preview of Your Bespoke Future</h1>
                <p class="result-text">Your bespoke look, brought to life. Customize your suit further in our state-of-the-art 3D Designer, share it with friends and family, or explore our most sought-after best-selling styles.</p>
                <a href="#" class="shop-btn inverted">SHOP THIS LOOK</a>
                <a href="#" class="shop-btn">CREATE YOUR OWN</a>
            </div>
        </div>
        <div class="result-right">
            <img id="finalGeneratedImage" src="suit-base.png" alt="Your Fresh Look" class="result-image">
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resultImg = document.getElementById('finalGeneratedImage');
            
            // Load generated image
            const generatedData = localStorage.getItem('generatedLook');
            if (generatedData) {
                resultImg.src = `data:image/png;base64,${generatedData}`;
            }
        });
    </script>
</body>
</html>
