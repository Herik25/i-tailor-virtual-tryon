<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor Virtual Try-On - Create your personal AI model to try on suits instantly.">
    <title>iTailor | Virtual Try-On</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="header">
            <div class="close-container">
                <button id="close-btn" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6.75729 17.2426L11.9999 12M17.2426 6.75736L11.9999 12M11.9999 12L6.75729 6.75736M11.9999 12L17.2426 17.2426" stroke="#482A18" stroke-width="1.125" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="logo-container">
                <span class="logo-main">iTailor<sup>®</sup></span><span class="logo-sub"> presents</span>
            </div>
        </div>
        <section class="content">
            <h1 class="main-title">Step Into Your Bespoke Look with just click.</h1>
            <p class="sub-text">Create your personal tailored preview instantly, private & secure. Experience every suit fabric we have to offer & share your bespoke look with friends and family.</p>
            
            <div class="material-selection">
                <label for="material-select">CHOOSE YOUR FABRIC</label>
                <div class="custom-select-wrapper">
                    <select id="material-select">
                        <option value="materials/Black Suit.jpg">Black Suit</option>
                        <option value="materials/Olive Suit.jpg">Olive Suit</option>
                        <option value="materials/Dark Navy.jpg">Dark Navy</option>
                        <option value="materials/Light Navy.jpg">Light Navy</option>
                        <option value="materials/BROWN Suit.jpg">Brown Suit</option>
                        <option value="materials/Textured Light Gray.jpg">Textured Light Gray</option>
                        <option value="materials/Textured Grey.jpg">Textured Grey</option>
                        <option value="materials/Textured Medium Grey.jpg">Textured Medium Grey</option>
                    </select>
                </div>
            </div>

            <button id="create-btn">CREATE YOUR LOOK</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
