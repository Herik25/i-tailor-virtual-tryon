<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor Virtual Try-On - Preview your personal AI model.">
    <title>iTailor | Your Preview</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        .preview-page-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(7px);
        }

        #header-placeholder {
            position: relative;
            z-index: 1500 !important;
        }

        .preview-ui-container {
            position: relative;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5rem;
            width: 100%;
            max-width: 1400px;
            padding: 2rem;
        }

        .visual-side {
            flex: 0 0 440px;
            position: relative;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            aspect-ratio: 1 / 1.1;
        }

        .visual-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .itailor-logo-badge {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 5;
            display: flex;
            align-items: flex-start;
        }

        .itailor-logo-badge h2 {
            font-family: 'Origin', sans-serif;
            color: #fff;
            font-weight: 300;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .itailor-logo-badge span {
            color: #fff;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            margin-left: 1px;
        }

        .info-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            color: #fff;
            max-width: 680px;
        }

        .main-heading-promo {
            font-family: 'Proxima Nova', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 55px;
            margin-block: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 10%;
        }

        .cta-flexbox {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .cta-action-btn {
            padding: 1rem 1.4rem;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 10%;
            border-radius: 2px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Proxima Nova', sans-serif;
        }

        .btn-cyan-theme {
            background: #00AEEF;
            color: #fff;
        }

        .btn-white-theme {
            background: #fff;
            color: #111;
        }

        .designer-signature {
            color: #E8D9BF !important;
            text-decoration: none;
            font-family: 'Proxima Nova', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 96%;
            letter-spacing: 10%;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .preview-ui-container {
                flex-direction: column;
                text-align: center;
                padding: 10vw 2rem;
                overflow-y: auto;
            }
            .visual-side {
                flex: none;
                width: 100%;
                max-width: 450px;
            }
            .info-side {
                align-items: center;
            }
            .main-heading-promo {
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }
            .cta-flexbox {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <section class="content">
            <img src="./buttons.png" alt="bespoke buttons" class="buttons-icon">
            <h1 class="main-title">Step Into Your Bespoke<br/> Look with just one click.</h1>
            <p class="sub-text">Create your personal tailored preview instantly, private & secure.<br/>
            Experience every suit fabric we have to offer & share your bespoke look with friends and family.</p>
            <button id="create-btn" style="pointer-events: none;">CREATE YOUR LOOK</button>
        </section>

        <div class="footer-trust">
            <img src="./trust-pilot.svg" alt="Trustpilot reviews" class="trust-pilot-img">
        </div>
    </main>

        document.addEventListener('DOMContentLoaded', () => {
            const previewImg = document.getElementById('previewImg');
            
            const generatedLook = localStorage.getItem('generatedLook');
            const finalLook = localStorage.getItem('finalLook');
            const targetData = generatedLook || finalLook;
            
            if (targetData) {
                const isDataUrl = targetData.startsWith('data:');
                const isExternalPath = targetData.startsWith('http') || targetData.includes('./') || targetData.includes('materials/');
                
                if (!isDataUrl && !isExternalPath) {
                    previewImg.src = `data:image/png;base64,${targetData}`;
                } else {
                    previewImg.src = targetData;
                }
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const passedImg = urlParams.get('img');
                if (passedImg) {
                    previewImg.src = passedImg;
                }
            }

            // Handle Redirection
            const designSuitBtn = document.getElementById('designSuitBtn');
            designSuitBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        });
