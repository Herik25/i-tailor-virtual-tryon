<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor Virtual Try-On - Preview your personal AI model.">
    <title>iTailor | Your Preview</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        .preview-page-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(7px);
        }

        #header-placeholder {
            position: relative;
            z-index: 1500 !important;
        }

        .preview-ui-container {
            position: relative;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            width: 100%;
            max-width: 1400px;
            padding: 2rem;
        }

        .visual-side {
            flex: 0 0 440px;
            position: relative;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            aspect-ratio: 1 / 1.1;
        }

        .visual-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .itailor-logo-badge {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 5;
            display: flex;
            align-items: flex-start;
        }

        .itailor-logo-badge h2 {
            font-family: 'Origin', sans-serif;
            color: #fff;
            font-weight: 300;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .itailor-logo-badge span {
            color: #fff;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            margin-left: 1px;
        }

        .info-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            color: #fff;
            max-width: 680px;
        }

        .main-heading-promo {
            font-family: 'Proxima Nova', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 55px;
            margin-block: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 10%;
        }

        .cta-flexbox {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .cta-action-btn {
            padding: 1rem 1.4rem;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 10%;
            border-radius: 2px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Proxima Nova', sans-serif;
        }

        .btn-cyan-theme {
            background: #00AEEF;
            color: #fff;
        }

        .btn-white-theme {
            background: #fff;
            color: #111;
        }

        .designer-signature {
            color: #E8D9BF !important;
            text-decoration: none;
            font-family: 'Proxima Nova', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 96%;
            letter-spacing: 10%;
        }

        .expand-btn, .lightbox-overlay {
            display: none;
        }

        .tp-mobile {
            display: none;
        }

        /* Responsive */

        @media (max-width: 1000px) {
            .main-heading-promo {
                font-size: 2rem;
                line-height: 1.3;
                padding: 0 10px;
                max-width: 100%;
            }
            .cta-flexbox {
                flex-direction: column;
                
            }
        }

        @media (max-width: 768px) {
            .preview-page-overlay {
                top: 40px;
                padding-top: 2rem;
            }

            .preview-ui-container {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem;
                gap: 1.5rem;
                justify-content: flex-start;
                display: flex;
            }

            /* Enable direct flex ordering for children of containers */
            .preview-ui-container {
                display: flex;
                flex-direction: column;
            }

            .info-side {
                order: 1;
                display: contents; /* Allows children to be ordered relative to visual-side */
            }

            .main-heading-promo {
                order: 1; /* Title at the top */
                font-size: 1.4rem;
                line-height: 1.3;
                margin: 0 0 1rem;
                padding: 0 10px;
                max-width: 100%;
            }

            .cta-flexbox {
                flex-direction: row;
            }

            .visual-side {
                order: 2; /* Image in the middle */
                flex: none;
                width: 100%;
                max-width: 360px;
                aspect-ratio: 1 / 1.1;
                border-radius: 12px;
                margin-bottom: 0.5rem;
                position: relative;
            }

            .expand-btn {
                position: absolute;
                bottom: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
                border: none;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10;
                background-color: transparent !important;
            }

            /* Lightbox Styles */
            .lightbox-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 10000;
                display: none;
                justify-content: center;
                align-items: center;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .lightbox-overlay.active {
                display: flex;
                opacity: 1;
            }

            .lightbox-content {
                position: relative;
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .lightbox-content img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                animation: zoomIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .lightbox-close {
                position: absolute;
                top: 30px;
                /* right: 30px; */
                background: transparent;
                border: none;
                cursor: pointer;
                z-index: 10001;
            }

            @keyframes zoomIn {
                from { transform: scale(0.9); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            .itailor-logo-badge {
                top: 15px;
                left: 15px;
            }

            .itailor-logo-badge img {
                height: 18px; /* Scale down logo */
                width: auto;
            }

            .cta-flexbox {
                order: 3; /* Buttons below image */
                gap: 0.8rem;
                width: 100%;
                max-width: 100%;
                margin: 0;
            }

            .cta-action-btn {
                width: 100%;
                padding: 1rem;
                font-size: 1rem;
                border-radius: 4px;
            }

            .designer-signature {
                order: 4; /* Signature below buttons */
                font-size: 0.9rem;
                color: rgba(255, 255, 255, 0.6) !important;
                margin-top: 1rem;
            }

            .info-side svg {
                order: 5; /* Trustpilot at the very bottom */
                width: 140px;
                height: auto;
                margin-top: 1rem;
            }

            .tp-mobile {
                display: block;
            }

            .tp-desktop {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .cta-flexbox {
                flex-direction: column;
            }
        }
    </style>
</head>

                    <button class="cta-action-btn btn-cyan-theme" id="designSuitBtn">design your suit</button>
                    <button class="cta-action-btn btn-white-theme">design your shirt</button>
                </div>

                <a href="https://www.itailor.com" class="designer-signature">made by iTailor.com</a>
            </div>
        </div>
    </div>

    <div id="imageLightbox" class="lightbox-overlay">
        <button id="closeLightbox" class="lightbox-close" aria-label="Close Lightbox">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="Full Screen Look">
        </div>
    </div>

    <script src="header.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const previewImg = document.getElementById('previewImg');
            
            const generatedLook = localStorage.getItem('generatedLook');
            const finalLook = localStorage.getItem('finalLook');
            const targetData = generatedLook || finalLook;
            
            if (targetData) {
                const isDataUrl = targetData.startsWith('data:');
                const isExternalPath = targetData.startsWith('http') || targetData.includes('./') || targetData.includes('materials/');
                
                if (!isDataUrl && !isExternalPath) {
                    previewImg.src = `data:image/png;base64,${targetData}`;
                } else {
                    previewImg.src = targetData;
                }
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const passedImg = urlParams.get('img');
                if (passedImg) {
                    previewImg.src = passedImg;
                }
            }

            // Lightbox Logic
            const expandImageBtn = document.getElementById('expandImageBtn');
            const imageLightbox = document.getElementById('imageLightbox');
            const closeLightbox = document.getElementById('closeLightbox');
            const lightboxImg = document.getElementById('lightboxImg');

            if (expandImageBtn) {
                expandImageBtn.onclick = () => {
                    lightboxImg.src = previewImg.src;
                    imageLightbox.classList.add('active');
                    document.body.style.overflow = 'hidden';
                };
            }

            const hideLightbox = () => {
                imageLightbox.classList.remove('active');
                document.body.style.overflow = '';
            };

            if (closeLightbox) closeLightbox.onclick = hideLightbox;

            // Close on escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && imageLightbox.classList.contains('active')) {
                    hideLightbox();
                }
            });

            // Handle Redirection
            const designSuitBtn = document.getElementById('designSuitBtn');
            if (designSuitBtn) {
                designSuitBtn.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
            }
        });
    </script>
</body>
</html>
