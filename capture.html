<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor Virtual Try-On - Capture your portrait for AI model generation.">
    <title>iTailor | Capture Portrait</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="container capture-container">
        <main class="capture-content">
            <h1 class="main-title secondary-title">Let’s Create Your Look</h1>
            <p class="sub-text mobile-view" style="font-family: 'Future Book', sans-serif; font-weight: 500; font-size: 18px; margin-bottom: 1.5rem; line-height: 125%;">Good lighting & a centered position help us craft your most<br /> precise tailored preview.</p>
            
            <div id="processingOverlay" class="processing-overlay hidden">
                <div class="luxury-loader">
                    <svg class="loader-svg" viewBox="0 0 100 100">
                        <circle class="track" cx="50" cy="50" r="48"></circle>
                        <circle class="luxury-ring" cx="50" cy="50" r="48"></circle>
                    </svg>
                    <div class="loading-slideshow">
                        <img src="./loading/loading-1.svg" alt="Crafting" class="loader-img">
                        <img src="./loading/loading-2.svg" alt="Tailoring" class="loader-img">
                        <img src="./loading/loading-3.svg" alt="Perfecting" class="loader-img">
                    </div>
                </div>
                <p id="loadingMsg">Crafting Your Bespoke Look</p>
            </div>

            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <img id="gallery-preview" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;">
                <div class="camera-blur-overlay"></div>
                <div class="face-guide">
                    <div class="face-oval">
                        <svg width="247" height="346" viewBox="0 0 247 346" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M244.983 155.779C244.983 187.114 237.279 222.409 224.048 246.717C215.127 263.106 199.517 297.101 187.17 308.279C168.192 325.462 150.185 343.983 123.483 343.983C96.7816 343.983 78.7752 325.462 59.7964 308.279C47.4503 297.101 31.8393 263.106 22.9187 246.717C9.68799 222.409 1.9834 187.114 1.9834 155.779C1.9834 121.462 6.27806 81.7233 21.8989 56.1366C44.9408 18.3941 81.8639 1.98291 123.483 1.98291C165.103 1.98291 202.026 18.3941 225.068 56.1366C240.689 81.7233 244.983 121.462 244.983 155.779Z" stroke="white" stroke-width="3.96594" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="15.86 15.86"/>
                        </svg>
                    </div>
                </div>                
                <div class="camera-loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <button id="capture-btn">Capture My Look</button>
            <div class="capture-input">
                <input type="file" id="gallery-input" accept="image/*" style="display: none;">
                <a href="#" id="gallery-link" class="gallery-link">Upload from Gallery</a>
            </div>
            <canvas id="canvas" style="display: none;"></canvas>
        </main>
    </div>
    <script src="header.js"></script>
    <script type="module" src="capture.js"></script>
</body>
</html>
