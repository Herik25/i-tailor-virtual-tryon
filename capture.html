<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="iTailor Virtual Try-On - Capture your portrait for AI model generation.">
    <title>iTailor | Capture Portrait</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="header">
            <div class="close-container">
                <button id="close-btn" aria-label="Close" onclick="window.location.href='index.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6.75729 17.2426L11.9999 12M17.2426 6.75736L11.9999 12M11.9999 12L6.75729 6.75736M11.9999 12L17.2426 17.2426" stroke="#482A18" stroke-width="1.125" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="logo-container">
                <span class="logo-main">iTailor<sup>®</sup></span><span class="logo-sub"> presents</span>
            </div>
        </div>

        <section class="content capture-content">
            <h1 class="main-title secondary-title">Center Your Face</h1>
            <p class="sub-text">Good lighting & a centered position help us craft your most precise tailored preview.</p>
            
            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <div class="face-guide">
                    <div class="face-oval">
                        <svg width="321" height="449" viewBox="0 0 321 449" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M318.344 201.98C318.344 242.752 308.31 288.676 291.079 320.305C279.46 341.63 259.129 385.863 243.05 400.407C218.332 422.766 194.881 446.864 160.104 446.864C125.328 446.864 101.877 422.766 77.1592 400.407C61.0798 385.863 40.7483 341.63 29.1302 320.305C11.8987 288.676 1.86432 242.752 1.86432 201.98C1.86432 157.326 7.45763 105.62 27.802 72.3275C57.8115 23.2181 105.9 1.86432 160.104 1.86432C214.309 1.86432 262.397 23.2181 292.407 72.3275C312.751 105.62 318.344 157.326 318.344 201.98Z" stroke="white" stroke-width="3.72867" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="14.91 14.91"/>
                        </svg>
                    </div>
                </div>
                <div class="camera-loading">
                    <div class="spinner"></div>
                </div>

                <!-- Unified Circular Progress Loader -->
                <div id="processingOverlay" class="processing-overlay hidden">
                    <div class="circular-progress">
                        <svg viewBox="0 0 100 100">
                            <circle class="bg" cx="50" cy="50" r="45"></circle>
                            <circle class="fg" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div id="progressPercent" class="progress-text">0%</div>
                    </div>
                    <p id="loadingMsg">Generating your look</p>
                </div>
            </div>

            <button id="capture-btn">Capture My Look</button>
            <canvas id="canvas" style="display: none;"></canvas>
        </section>
    </main>
    <script type="module" src="capture.js"></script>
</body>
</html>
